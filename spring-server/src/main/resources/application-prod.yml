spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/securekey_locksmith_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  frontend-url: ${CLIENT_URL:http://localhost:8081}
